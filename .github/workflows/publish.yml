name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      no-cache:
        description: 'Build without cache'
        type: boolean
        default: false

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          REPO=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          DATE=$(date +'%Y.%m.%d')
          TAG_PREFIX="latest"
          TAG_DATE="${DATE}"
          echo "tags=${REPO}:${TAG_PREFIX},${REPO}:${TAG_DATE}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: ${{ (github.ref_name != 'main' && github.event.inputs.no-cache != 'true') && 'type=gha' || '' }}
          cache-to: ${{ (github.ref_name != 'main' && github.event.inputs.no-cache != 'true') && 'type=gha,mode=max' || '' }}
          no-cache: ${{ github.ref_name == 'main' || github.event.inputs.no-cache == 'true' }}
